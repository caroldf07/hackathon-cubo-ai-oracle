version: 2.1

jobs:
  security-audit:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install pip-audit
          command: pip install pip-audit
      - run:
          name: Backend security audit
          command: cd aplicacao/backend && pip-audit -r requirements.txt --desc

  backend-check:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd aplicacao/backend && pip install -r requirements.txt
      - run:
          name: Check syntax
          command: cd aplicacao/backend && python -m py_compile main.py

  frontend-build-test:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-frontend-{{ checksum "aplicacao/frontend/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd aplicacao/frontend && npm ci
      - save_cache:
          paths:
            - aplicacao/frontend/node_modules
          key: v1-frontend-{{ checksum "aplicacao/frontend/package-lock.json" }}
      - run:
          name: Security audit
          command: cd aplicacao/frontend && npm audit --audit-level=critical
      - run:
          name: Build
          command: cd aplicacao/frontend && npm run build

  deploy-vercel:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - run:
          name: Deploy frontend to Vercel
          command: |
            npm install -g vercel@latest
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel deploy --prod --yes --token=$VERCEL_TOKEN

workflows:
  ci-cd:
    jobs:
      - security-audit
      - backend-check
      - frontend-build-test
      - deploy-vercel:
          requires:
            - security-audit
            - frontend-build-test
          filters:
            branches:
              only: main
